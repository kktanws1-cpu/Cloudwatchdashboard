name: Telegram → TikTok Bot

on:
  schedule:
    - cron: '*/15 * * * *'   # runs every 15 minutes
  workflow_dispatch:           # also allows manual trigger from GitHub UI

# Prevent overlapping runs — queue rather than cancel
concurrency:
  group: telegram-tiktok-bot
  cancel-in-progress: false

permissions:
  contents: write              # needed to commit state.json back to repo

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: telegramtotiktok/package-lock.json

      - name: Install dependencies
        working-directory: telegramtotiktok
        run: npm ci

      - name: Refresh TikTok token if expired
        working-directory: telegramtotiktok
        env:
          TIKTOK_CLIENT_KEY:    ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_ACCESS_TOKEN:  ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          GH_PAT:               ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
        run: node src/refresh-token.js

      - name: Run bot
        working-directory: telegramtotiktok
        env:
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_ID:    ${{ secrets.TELEGRAM_GROUP_ID }}
          TIKTOK_ACCESS_TOKEN:  ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_PRIVACY_LEVEL: ${{ vars.TIKTOK_PRIVACY_LEVEL }}
          DEFAULT_CAPTION:      ${{ vars.DEFAULT_CAPTION }}
          TIKTOK_ALLOW_COMMENT: ${{ vars.TIKTOK_ALLOW_COMMENT }}
          TIKTOK_ALLOW_DUET:    ${{ vars.TIKTOK_ALLOW_DUET }}
          TIKTOK_ALLOW_STITCH:  ${{ vars.TIKTOK_ALLOW_STITCH }}
        run: node run.js

      - name: Save state
        working-directory: telegramtotiktok
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update bot state [skip ci]"
          git push
